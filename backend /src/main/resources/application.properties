# Server Configuration
server.port=${PORT:8080}
spring.application.name=Quantify Trading Platform

# Database Configuration for Neon PostgreSQL
# IMPORTANT: Set DATABASE_URL without channel_binding parameter
# Example: jdbc:postgresql://ep-xxx.neon.tech/neondb?user=xxx&password=xxx&sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Let Hibernate auto-detect the dialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Security Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://quantify-trading.vercel.app}

# Groq API Configuration
groq.api-key=${GROQ_API_KEY:}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.timeout=${GROQ_TIMEOUT:30000}

# Ollama Configuration (Fallback)
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3:latest}
ollama.timeout=${OLLAMA_TIMEOUT:120000}

# Redis Configuration (Optional - disabled by default for Render free tier)
spring.data.redis.enabled=${REDIS_ENABLED:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Disable Redis auto-configuration if not using Redis
spring.autoconfigure.exclude=${REDIS_EXCLUDE:org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration}

# Logging
logging.level.com.quantify=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.boot=INFO

# Actuator Configuration for Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.redis.enabled=false
