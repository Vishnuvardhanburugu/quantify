services:
  - type: web
    name: quantify-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: quantify-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://quantify-trading.vercel.app,http://localhost:3000,http://localhost:5173
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OLLAMA_BASE_URL
        sync: false

databases:
  - name: quantify-db
    databaseName: quantify
    user: quantify
    plan: free
    region: oregon
