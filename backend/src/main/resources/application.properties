# Server Configuration
server.port=${PORT:8080}
spring.application.name=Quantify Trading Platform

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:testdb}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

# Security Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production-minimum-256-bits}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# Groq API Configuration
groq.api-key=${GROQ_API_KEY:}
groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.timeout=${GROQ_TIMEOUT:30000}

# Ollama Configuration (Fallback)
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3:latest}
ollama.timeout=${OLLAMA_TIMEOUT:120000}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.com.quantify=INFO
logging.level.org.springframework.security=INFO
